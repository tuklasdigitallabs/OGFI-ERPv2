services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web.example
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - private

  worker:
    profiles:
      - future-worker
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker.example
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - private

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ogfi_erp
      POSTGRES_USER: ogfi
      POSTGRES_PASSWORD: change-me-in-real-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogfi -d ogfi_erp"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  redis:
    profiles:
      - future-worker
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  minio:
    # Local-development service only. Hosted overlays disable it explicitly.
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-04-22T22-12-26Z}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - private

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-8443}:443"
    volumes:
      - ./infra/caddy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - private

networks:
  private:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
