name: Staging Rollback Rehearsal

on:
  workflow_dispatch:
    inputs:
      rollback_release_version:
        description: Existing staging release version to restore.
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
      ROLLBACK_RELEASE_VERSION: ${{ inputs.rollback_release_version }}
      CONFIRM_STAGING_ROLLBACK: "yes"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Verify staging rollback secrets
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_APP_DIR"
          test -n "${{ secrets.STAGING_BASE_URL }}"
      - name: Install SSH key
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          test -n "$STAGING_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$STAGING_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts
      - name: Run guarded staging rollback
        run: pnpm release:staging:rollback
      - name: Collect rollback evidence
        run: |
          mkdir -p release-evidence/staging-rollback
          scp -r "$STAGING_USER@$STAGING_HOST:$STAGING_APP_DIR/releases/$ROLLBACK_RELEASE_VERSION/release-evidence/staging-rollback/." release-evidence/staging-rollback/ || true
      - name: Write rollback evidence summary
        env:
          ROLLBACK_RELEASE_VERSION: ${{ inputs.rollback_release_version }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          RELEASE_ENVIRONMENT: staging-rollback
        run: pnpm release:rollback-summary
      - name: Run post-rollback smoke checks
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          SMOKE_OUTPUT_DIR: release-evidence/staging-rollback/smoke
        run: pnpm release:smoke
      - run: pnpm release:evidence:manifest
      - uses: actions/upload-artifact@v4
        with:
          name: ogfi-staging-rollback-evidence-${{ inputs.rollback_release_version }}
          path: |
            release-evidence/staging-rollback
            release-evidence/manifests
          if-no-files-found: error
