name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ogfi_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ogfi_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-start-period=10s
          --health-retries=20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_ci?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:secret-review
      - run: pnpm release:tools:test
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @ogfi/web build
      - run: pnpm --filter @ogfi/database test
      - run: pnpm --filter @ogfi/worker test
      - run: pnpm --filter @ogfi/ui test
      - run: pnpm --filter @ogfi/web test -- --exclude tests/accessControl.integration.test.ts
      - run: pnpm test:access-control
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
