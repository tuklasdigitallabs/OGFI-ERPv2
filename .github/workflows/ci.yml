name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ogfi_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ogfi_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-start-period=10s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_ci?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_ci?schema=public
      DEMO_USER_EMAIL: user@example.test
      DEMO_APPROVER_EMAIL: approver@example.test
      DEMO_ADMIN_EMAIL: admin@example.test
      DEMO_SUPER_USER_EMAIL: super.admin@ogfi.example
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:secret-review
      - run: pnpm release:tools:test
      - run: pnpm release:migration-review
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm typecheck:e2e
      - run: pnpm --filter @ogfi/web build
        env:
          NODE_ENV: production
      - run: pnpm --filter @ogfi/database test
      - run: pnpm --filter @ogfi/worker test
      - run: pnpm --filter @ogfi/ui test
      - run: pnpm test:authorization
        env:
          AUTHORIZATION_DATABASE_INTEGRATION: "yes"
          AUTHORIZATION_TEST_DATABASE: ogfi_ci
          AUTHORIZATION_TEST_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          AUTHORIZATION_DATABASE_INTEGRATION: "yes"
          AUTHORIZATION_TEST_DATABASE: ogfi_ci
          AUTHORIZATION_TEST_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      - run: pnpm release:authorization-manifest
        env:
          AUTHORIZATION_DATABASE_INTEGRATION: "yes"
          AUTHORIZATION_TEST_DATABASE: ogfi_ci
          AUTHORIZATION_TEST_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
      - name: Upload CI verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-verification-${{ github.run_id }}-${{ github.sha }}
          if-no-files-found: warn
          retention-days: 90
          path: |
            release-evidence/
            apps/web/playwright-report/
            apps/web/test-results/
