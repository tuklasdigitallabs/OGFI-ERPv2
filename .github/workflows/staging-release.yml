name: Staging Release Rehearsal

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version or candidate label.
        required: true
        type: string
      predecessor_sha:
        description: Exact previously released commit SHA used to build the populated upgrade baseline.
        required: true
        type: string
      predecessor_ci_run_id:
        description: Successful hosted CI run ID whose head SHA is the approved predecessor.
        required: true
        type: string
      deploy_to_staging:
        description: Run guarded staging deploy after checks pass.
        required: true
        default: false
        type: boolean

jobs:
  rehearse:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ogfi_release
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ogfi_release"
          --health-interval=5s
          --health-timeout=5s
          --health-start-period=10s
          --health-retries=20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_release?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_release?schema=public
      BACKUP_FILE: release-evidence/backups/ogfi-erp-pre-migration-rehearsal.dump
      RELEASE_EVIDENCE_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      RELEASE_CANDIDATE_SHA: ${{ github.sha }}
      RELEASE_PREDECESSOR_SHA: ${{ inputs.predecessor_sha }}
      RELEASE_PREDECESSOR_REF: github-actions-run-${{ inputs.predecessor_ci_run_id }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_SHA: ${{ github.sha }}
      DEPLOY_TO_STAGING: ${{ inputs.deploy_to_staging }}
      RELEASE_ENVIRONMENT: staging-rehearsal
      RELEASE_MIGRATION_MODE: prisma-deploy
      MINIO_IMAGE: minio/minio:RELEASE.2025-04-22T22-12-26Z
      MINIO_ROOT_USER: local-minio-admin
      MINIO_ROOT_PASSWORD: release-rehearsal-only
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - run: pnpm install --frozen-lockfile
      - run: pnpm release:secret-review
      - name: Run release tool self-tests in an isolated environment
        run: >-
          env
          -u NODE_ENV
          -u DATABASE_URL
          -u DIRECT_DATABASE_URL
          -u BACKUP_FILE
          -u RELEASE_EVIDENCE_RUN_ID
          -u RELEASE_VERSION
          -u RELEASE_CANDIDATE_SHA
          -u RELEASE_PREDECESSOR_SHA
          -u RELEASE_PREDECESSOR_REF
          -u GITHUB_RUN_ID
          -u GITHUB_SHA
          -u DEPLOY_TO_STAGING
          -u RELEASE_ENVIRONMENT
          -u RELEASE_MIGRATION_MODE
          -u MINIO_IMAGE
          -u MINIO_ROOT_USER
          -u MINIO_ROOT_PASSWORD
          pnpm release:tools:test
      - run: pnpm db:generate
      - name: Verify exact predecessor release
        env:
          GH_TOKEN: ${{ github.token }}
          PREDECESSOR_SHA: ${{ inputs.predecessor_sha }}
          PREDECESSOR_CI_RUN_ID: ${{ inputs.predecessor_ci_run_id }}
        run: |
          test "$(git rev-parse "$PREDECESSOR_SHA^{commit}")" = "$PREDECESSOR_SHA"
          test "$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PREDECESSOR_CI_RUN_ID" --jq '.head_sha')" = "$PREDECESSOR_SHA"
          test "$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PREDECESSOR_CI_RUN_ID" --jq '.conclusion')" = "success"
          test "$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$PREDECESSOR_CI_RUN_ID" --jq '.name')" = "CI"
          test "$PREDECESSOR_SHA" != "$GITHUB_SHA"
          git merge-base --is-ancestor "$PREDECESSOR_SHA" "$GITHUB_SHA"
          git worktree add --detach predecessor-release "$PREDECESSOR_SHA"
      - name: Inventory and review migration files
        env:
          RELEASE_CANDIDATE_SHA: ${{ github.sha }}
          RELEASE_MIGRATION_REVIEW_REQUIRE_APPROVED: "yes"
        run: pnpm release:migration-review
      - name: Build populated predecessor baseline
        env:
          RELEASE_CANDIDATE_SHA: ${{ github.sha }}
          RELEASE_PREDECESSOR_SHA: ${{ inputs.predecessor_sha }}
          RELEASE_PREDECESSOR_REF: github-actions-run-${{ inputs.predecessor_ci_run_id }}
        run: |
          pnpm --filter @ogfi/database exec prisma migrate deploy --schema "$GITHUB_WORKSPACE/predecessor-release/packages/database/prisma/schema.prisma"
          ln -s "$GITHUB_WORKSPACE/node_modules" "$GITHUB_WORKSPACE/predecessor-release/node_modules"
          ln -s "$GITHUB_WORKSPACE/packages/database/node_modules" "$GITHUB_WORKSPACE/predecessor-release/packages/database/node_modules"
          pnpm exec tsx "$GITHUB_WORKSPACE/predecessor-release/packages/database/src/seed.ts"
          pnpm release:predecessor-baseline
      - name: Verify predecessor business and scope invariants
        env:
          RELEASE_CANDIDATE_SHA: ${{ github.sha }}
          RELEASE_DATA_INVARIANT_LABEL: pre-migration-rehearsal
        run: pnpm release:data-invariants
      - name: Check data snapshot prerequisites
        env:
          RELEASE_DATA_SNAPSHOT_LABEL: pre-migration-rehearsal
          RELEASE_DATA_SNAPSHOT_OUTPUT_DIR: release-evidence/data-snapshots
        run: pnpm release:data-snapshot-preflight
      - name: Capture pre-migration data snapshot
        env:
          RELEASE_DATA_SNAPSHOT_LABEL: pre-migration-rehearsal
          RELEASE_DATA_SNAPSHOT_OUTPUT_DIR: release-evidence/data-snapshots
        run: pnpm release:data-snapshot
      - name: Create pre-migration recovery point
        env:
          BACKUP_DIR: release-evidence/backups
        run: pnpm db:backup
      - name: Record pre-migration backup summary
        run: pnpm release:backup-summary
      - name: Create isolated negative migration database
        env:
          RESTORE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_negative_rehearsal?schema=public
        run: |
          psql "$DIRECT_DATABASE_URL" -v ON_ERROR_STOP=1 -c 'drop database if exists ogfi_negative_rehearsal;'
          psql "$DIRECT_DATABASE_URL" -v ON_ERROR_STOP=1 -c 'create database ogfi_negative_rehearsal;'
          pnpm db:restore-check
      - name: Prove cross-scope predecessor data blocks atomically
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_negative_rehearsal?schema=public
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_negative_rehearsal?schema=public
        run: |
          mkdir -p release-evidence/migration-execution
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO "Company" ("id", "tenantId", "code", "legalName", "currencyCode", "timezone", "status", "createdAt", "updatedAt")
          VALUES ('10000000-0000-4000-8000-000000009099'::uuid, '00000000-0000-4000-8000-000000000001'::uuid, 'MIG-NEG', 'Migration Negative Fixture', 'PHP', 'Asia/Manila', 'ACTIVE', now(), now());
          INSERT INTO "ProjectRequirement" (
            "id", "tenantId", "companyId", "projectId", "taskId", "kind", "code", "label",
            "ownerUserId", "status", "createdByUserId", "updatedByUserId", "createdAt", "updatedAt"
          )
          SELECT
            '10000000-0000-4000-8000-000000009098'::uuid, "tenantId",
            '10000000-0000-4000-8000-000000009099'::uuid, "projectId", "taskId", "kind",
            'MIGRATION-NEGATIVE-SCOPE', 'Intentional cross-company negative fixture',
            "ownerUserId", 'PENDING', "createdByUserId", "updatedByUserId", now(), now()
          FROM "ProjectRequirement" WHERE "id" = '10000000-0000-4000-8000-000000009003'::uuid;
          SQL
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from \"ProjectRequirement\" where id = '10000000-0000-4000-8000-000000009098'::uuid and \"companyId\" = '10000000-0000-4000-8000-000000009099'::uuid")" = "1"
          if pnpm db:migrate:deploy; then
            echo "Cross-scope migration unexpectedly succeeded." >&2
            exit 1
          fi
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from pg_constraint where conname in ('ProjectRequirement_projectId_fkey','ProjectRequirement_taskId_fkey')")" = "2"
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from pg_constraint where conname like 'spf002_%'")" = "0"
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from pg_indexes where indexname in ('ProjectRequirement_tenantId_companyId_ownerUserId_status_idx','ProjectRequirement_tenantId_companyId_reviewerUserId_status_idx')")" = "0"
          test "$(psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select count(*) from \"_prisma_migrations\" where migration_name = '20260721120000_reconcile_schema_drift' and finished_at is not null")" = "0"
          { echo "Evidence run ID: $RELEASE_EVIDENCE_RUN_ID"; echo "Candidate SHA: $GITHUB_SHA"; echo "RESULT | PASS | Cross-scope fixture blocked and the migration transaction rolled back."; } > release-evidence/migration-execution/negative-scope-rollback.txt
      - name: Apply reviewed candidate migrations
        run: |
          mkdir -p release-evidence/migration-execution
          { echo "Evidence run ID: $RELEASE_EVIDENCE_RUN_ID"; echo "Candidate SHA: $GITHUB_SHA"; pnpm db:migrate:deploy; echo "RESULT | PASS | Reviewed candidate migrations applied."; } | tee release-evidence/migration-execution/first-deploy.txt
          { echo "Evidence run ID: $RELEASE_EVIDENCE_RUN_ID"; psql "$DIRECT_DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select migration_name || '|' || checksum || '|' || coalesce(finished_at::text, '') || '|' || coalesce(rolled_back_at::text, '') from \"_prisma_migrations\" order by started_at, migration_name"; } > release-evidence/migration-execution/journal-after-first-deploy.txt
      - name: Capture first-deploy idempotency baseline
        env:
          RELEASE_DATA_SNAPSHOT_LABEL: post-first-deploy
          RELEASE_DATA_SNAPSHOT_OUTPUT_DIR: release-evidence/data-snapshots
        run: pnpm release:data-snapshot
      - name: Verify idempotent migration deployment
        run: |
          { echo "Evidence run ID: $RELEASE_EVIDENCE_RUN_ID"; echo "Candidate SHA: $GITHUB_SHA"; pnpm db:migrate:deploy; echo "RESULT | PASS | Idempotent migration deployment verified."; } | tee release-evidence/migration-execution/second-deploy.txt
          grep -F "No pending migrations to apply." release-evidence/migration-execution/second-deploy.txt
          { echo "Evidence run ID: $RELEASE_EVIDENCE_RUN_ID"; psql "$DIRECT_DATABASE_URL" -v ON_ERROR_STOP=1 -At -c "select migration_name || '|' || checksum || '|' || coalesce(finished_at::text, '') || '|' || coalesce(rolled_back_at::text, '') from \"_prisma_migrations\" order by started_at, migration_name"; } > release-evidence/migration-execution/journal-after-second-deploy.txt
          cmp release-evidence/migration-execution/journal-after-first-deploy.txt release-evidence/migration-execution/journal-after-second-deploy.txt
      - name: Prove idempotent deploy preserved all table counts
        env:
          RELEASE_DATA_SNAPSHOT_LABEL: post-idempotency
          RELEASE_DATA_SNAPSHOT_OUTPUT_DIR: release-evidence/data-snapshots
        run: |
          pnpm release:data-snapshot
          RELEASE_DATA_SNAPSHOT_BEFORE="$(ls release-evidence/data-snapshots/data-post-first-deploy-*.txt | tail -n 1)" \
          RELEASE_DATA_SNAPSHOT_AFTER="$(ls release-evidence/data-snapshots/data-post-idempotency-*.txt | tail -n 1)" \
          RELEASE_DATA_SNAPSHOT_COMPARE_OUTPUT_FILE=release-evidence/migration-execution/idempotency-data-delta.txt \
          RELEASE_DATA_SNAPSHOT_REQUIRE_UNCHANGED=yes \
          pnpm release:data-snapshot:compare
      - name: Verify schema has zero unexplained drift
        run: |
          mkdir -p release-evidence/schema-drift
          { echo "Evidence run ID: $RELEASE_EVIDENCE_RUN_ID"; echo "Candidate SHA: $GITHUB_SHA"; pnpm --filter @ogfi/database exec prisma migrate diff --from-schema-datasource prisma/schema.prisma --to-schema-datamodel prisma/schema.prisma --exit-code; echo "RESULT | PASS | Zero schema drift verified."; } | tee release-evidence/schema-drift/zero-drift.txt
          grep -F "No difference detected." release-evidence/schema-drift/zero-drift.txt
      - name: Capture post-migration data snapshot
        env:
          RELEASE_DATA_SNAPSHOT_LABEL: post-migration-rehearsal
          RELEASE_DATA_SNAPSHOT_OUTPUT_DIR: release-evidence/data-snapshots
        run: pnpm release:data-snapshot
      - name: Verify post-migration business and scope invariants
        env:
          RELEASE_CANDIDATE_SHA: ${{ github.sha }}
          RELEASE_DATA_INVARIANT_LABEL: post-migration-rehearsal
        run: pnpm release:data-invariants
      - name: Compare migration data snapshots
        run: pnpm release:data-snapshot:compare-latest
      - name: Check backup and restore prerequisites
        env:
          BACKUP_FILE: release-evidence/backups/preflight-placeholder.dump
          BACKUP_DIR: release-evidence/backups
          RESTORE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_restore_rehearsal?schema=public
        run: pnpm release:backup-restore-preflight
      - name: Restore pre-migration recovery point and prove row equivalence
        env:
          BACKUP_DIR: release-evidence/backups
          RESTORE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_restore_rehearsal?schema=public
        run: |
          psql "$DIRECT_DATABASE_URL" -v ON_ERROR_STOP=1 -c 'drop database if exists ogfi_restore_rehearsal;'
          psql "$DIRECT_DATABASE_URL" -v ON_ERROR_STOP=1 -c 'create database ogfi_restore_rehearsal;'
          pnpm db:restore-check
      - name: Record restore summary
        env:
          RESTORE_DATABASE: ogfi_restore_rehearsal
        run: pnpm release:restore-summary
      - name: Prove restored row-content equivalence
        env:
          SOURCE_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_release?schema=public
          TARGET_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_restore_rehearsal?schema=public
        run: pnpm release:data-equivalence
      - name: Verify restored predecessor invariants
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ogfi_restore_rehearsal?schema=public
          RELEASE_DATA_INVARIANT_LABEL: restored-predecessor
        run: pnpm release:data-invariants
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm release:build-check
      - run: pnpm --filter @ogfi/database test
      - run: pnpm --filter @ogfi/worker test
      - run: pnpm --filter @ogfi/ui test
      - run: pnpm --filter @ogfi/web test -- --exclude tests/accessControl.integration.test.ts
      - run: pnpm test:access-control
      - run: pnpm --dir apps/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: docker compose config > release-compose-default.yml
      - run: docker compose --profile future-worker config > release-compose-future-worker.yml
      - name: Check release summary metadata
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOY_TO_STAGING: ${{ inputs.deploy_to_staging }}
          RELEASE_ENVIRONMENT: staging-rehearsal
        run: pnpm release:summary-preflight
      - name: Write release evidence summary
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          DEPLOY_TO_STAGING: ${{ inputs.deploy_to_staging }}
          RELEASE_ENVIRONMENT: staging-rehearsal
        run: pnpm release:summary
      - run: cp release-compose-default.yml release-compose-future-worker.yml release-evidence/
      - run: pnpm release:evidence:manifest
      - uses: actions/upload-artifact@v4
        with:
          name: ogfi-release-evidence-${{ inputs.release_version }}
          path: release-evidence
          if-no-files-found: error

  deploy:
    needs: rehearse
    if: ${{ inputs.deploy_to_staging }}
    runs-on: ubuntu-latest
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      CONFIRM_STAGING_DEPLOY: "yes"
      STAGING_CAPTURE_DATA_SNAPSHOTS: "yes"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Verify staging secrets
        run: |
          test -n "$STAGING_HOST"
          test -n "$STAGING_USER"
          test -n "$STAGING_APP_DIR"
          test -n "${{ secrets.STAGING_BASE_URL }}"
      - name: Install SSH key
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          test -n "$STAGING_SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$STAGING_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts
      - run: pnpm release:staging:deploy
      - name: Collect staging deploy data snapshots
        run: |
          mkdir -p release-evidence/staging-deploy
          scp -r "$STAGING_USER@$STAGING_HOST:$STAGING_APP_DIR/releases/$RELEASE_VERSION/release-evidence/staging-deploy/." release-evidence/staging-deploy/ || true
      - name: Run staging smoke checks
        env:
          SMOKE_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          SMOKE_OUTPUT_DIR: release-evidence/smoke
        run: pnpm release:smoke
      - run: pnpm release:evidence:manifest
      - uses: actions/upload-artifact@v4
        with:
          name: ogfi-staging-deploy-evidence-${{ inputs.release_version }}
          path: |
            release-evidence/smoke
            release-evidence/staging-deploy
            release-evidence/manifests
          if-no-files-found: error
