# Reference only — becomes runnable after apps/web and apps/worker are scaffolded.
# Use environment-specific compose files or overrides for staging and production.

services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web.example
      args:
        NODE_VERSION: ${NODE_VERSION}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - private

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker.example
      args:
        NODE_VERSION: ${NODE_VERSION}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - private

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ogfi_erp
      POSTGRES_USER: ogfi
      POSTGRES_PASSWORD: change-me-in-real-env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ogfi -d ogfi_erp"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - private

  minio:
    image: ${MINIO_IMAGE:?Set an immutable MinIO image tag or digest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - private

  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile.example:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - private

networks:
  private:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
